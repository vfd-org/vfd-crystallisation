segment: visual-math
title: "Derive Hardy–Littlewood by playing: the prime wheels"
claim: >
  Prime patterns live or die cell-by-cell on each prime's wheel, and counting
  the surviving cells derives the Hardy–Littlewood constants in full: why
  twins occur, why gap-6 pairs occur exactly twice as often (predicted
  exactly; sieve says 1.9950), and why (n, n+2, n+4) happens exactly once in
  all of mathematics. An in-browser lab sieves to 2×10⁷ live and verifies any
  pattern you invent on the spot.
value: "twins predicted to 0.16% in-browser; every preset within Poisson noise"
target: "live sieve counts, computed in the visitor's own browser"
error: "nothing pre-recorded; the page computes everything on load"
inputs:
  - "Residue wheels (finite cyclic screens) — the entire local mechanism"
  - "One multiplication: survival ratio per wheel, product over all wheels"
  - "The standard density integral (log-space, documented lower limit)"
  - "An in-browser sieve to 2×10⁷ as the referee"
falsifier: >
  Type any offsets into explorables/residue-wheels.html: a pattern whose live
  count departs from the wheel product beyond Poisson noise kills the law on
  the spot, in the visitor's own browser.
