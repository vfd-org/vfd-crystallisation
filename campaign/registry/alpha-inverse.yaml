title: "α⁻¹ = 137 + π/87 from 600-cell eigenvalue structure"
claim: >
  The inverse fine-structure constant is reproduced to 0.81 ppm by
  α⁻¹ = 87 + 50 + π/87 ≈ 137.03611, where 50 = 9+12+14+15 is the sum of the
  non-zero 600-cell Laplacian eigenvalues and 87 is derived from the same
  eigenvalue data — zero adjustable parameters.
value: "137.03611"
target: "137.035999 (CODATA)"
error: "0.81 ppm"
inputs:
