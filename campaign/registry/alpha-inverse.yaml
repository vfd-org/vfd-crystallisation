  - "50 = sum of the non-zero eigenvalues (forced)"
  - "87 from eigenvalue/multiplicity structure (derivation in script + Paper XXII)"
  - "No continuous parameters anywhere in the expression"
falsifier: >
  The expression is rigid: if the derivation of 87 or 50 requires any choice not
  forced by the spectrum, or a future CODATA value moves by more than ~1 ppm,
  the claim dies. The derivation chain is enumerated step-by-step in the script.
