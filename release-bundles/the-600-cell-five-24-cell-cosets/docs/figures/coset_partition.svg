<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14">
  <style>
    .frame { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
    .c0 { fill: #fde68a; }
    .c1 { fill: #bfdbfe; }
    .c2 { fill: #bbf7d0; }
    .c3 { fill: #fbcfe8; }
    .c4 { fill: #ddd6fe; }
    .small { fill: #4b5563; font-size: 12px; }
    .accent { fill: #dc2626; }
  </style>

  <text x="360" y="30" text-anchor="middle" font-size="20" font-weight="600">V₆₀₀ = C₀ ⊔ C₁ ⊔ C₂ ⊔ C₃ ⊔ C₄</text>
  <text x="360" y="52" text-anchor="middle" class="small">five disjoint right cosets of 2T inside 2I</text>

  <rect class="frame" x="40" y="76" width="640" height="240" rx="10"/>
  <text x="360" y="100" text-anchor="middle" font-weight="600">V₆₀₀ = 2I  (120 vertices)</text>

  <g>
    <rect x="68" y="124" width="116" height="168" rx="8" class="c0" stroke="#1f2937" stroke-width="1.5"/>
    <text x="126" y="170" text-anchor="middle" font-weight="600">C₀ = V₂₄</text>
    <text x="126" y="190" text-anchor="middle" class="small">= 2T (σ-fixed)</text>
    <text x="126" y="210" text-anchor="middle" class="small">24 verts</text>
    <text x="126" y="234" text-anchor="middle" class="small">d²=1 graph:</text>
    <text x="126" y="252" text-anchor="middle" class="small">8-regular, 96 edges</text>

    <rect x="194" y="124" width="116" height="168" rx="8" class="c1" stroke="#1f2937" stroke-width="1.5"/>
    <text x="252" y="170" text-anchor="middle" font-weight="600">C₁</text>
    <text x="252" y="190" text-anchor="middle" class="small">2T·g₁</text>
    <text x="252" y="210" text-anchor="middle" class="small">24 verts</text>
    <text x="252" y="234" text-anchor="middle" class="small">d²=1 graph:</text>
    <text x="252" y="252" text-anchor="middle" class="small">8-regular, 96 edges</text>

    <rect x="320" y="124" width="116" height="168" rx="8" class="c2" stroke="#1f2937" stroke-width="1.5"/>
    <text x="378" y="170" text-anchor="middle" font-weight="600">C₂</text>
    <text x="378" y="190" text-anchor="middle" class="small">2T·g₂</text>
    <text x="378" y="210" text-anchor="middle" class="small">24 verts</text>
    <text x="378" y="234" text-anchor="middle" class="small">d²=1 graph:</text>
    <text x="378" y="252" text-anchor="middle" class="small">8-regular, 96 edges</text>

    <rect x="446" y="124" width="116" height="168" rx="8" class="c3" stroke="#1f2937" stroke-width="1.5"/>
    <text x="504" y="170" text-anchor="middle" font-weight="600">C₃</text>
    <text x="504" y="190" text-anchor="middle" class="small">2T·g₃</text>
    <text x="504" y="210" text-anchor="middle" class="small">24 verts</text>
    <text x="504" y="234" text-anchor="middle" class="small">d²=1 graph:</text>
    <text x="504" y="252" text-anchor="middle" class="small">8-regular, 96 edges</text>

    <rect x="572" y="124" width="116" height="168" rx="8" class="c4" stroke="#1f2937" stroke-width="1.5"/>
    <text x="630" y="170" text-anchor="middle" font-weight="600">C₄</text>
    <text x="630" y="190" text-anchor="middle" class="small">2T·g₄</text>
    <text x="630" y="210" text-anchor="middle" class="small">24 verts</text>
    <text x="630" y="234" text-anchor="middle" class="small">d²=1 graph:</text>
    <text x="630" y="252" text-anchor="middle" class="small">8-regular, 96 edges</text>
  </g>

  <text x="360" y="346" text-anchor="middle" class="small">disjoint union: |C₀| + |C₁| + |C₂| + |C₃| + |C₄| = 5 × 24 = 120</text>
  <text x="360" y="368" text-anchor="middle" class="accent">A₅ = 2I / {±1} permutes the five cosets (faithful, transitive)</text>
</svg>
