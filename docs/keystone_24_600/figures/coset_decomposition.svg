<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14">
  <style>
    .v600 { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
    .c0 { fill: #fde68a; }
    .c1 { fill: #bfdbfe; }
    .c2 { fill: #bbf7d0; }
    .c3 { fill: #fbcfe8; }
    .c4 { fill: #ddd6fe; }
    .lbl { fill: #111827; }
    .small { fill: #4b5563; font-size: 12px; }
    .accent { fill: #dc2626; }
  </style>

  <text x="350" y="32" text-anchor="middle" font-size="20" font-weight="600">600-cell vertex set = ⊔ five 24-cell cosets</text>

  <!-- Large box representing V_600 -->
  <rect x="40" y="60" width="620" height="320" rx="10" class="v600"/>
  <text x="350" y="84" text-anchor="middle" font-weight="600">V₆₀₀ = 2I (120 vertices)</text>

  <!-- Five inscribed coset boxes -->
  <g>
    <rect x="70" y="120" width="110" height="230" rx="8" class="c0" stroke="#1f2937" stroke-width="1.5"/>
    <text x="125" y="200" text-anchor="middle" font-weight="600">C₀ = V₂₄</text>
    <text x="125" y="220" text-anchor="middle" class="small">σ-fixed, 24 verts</text>
    <text x="125" y="240" text-anchor="middle" class="small">d²=1 → 8-reg, 96 edges</text>
    <text x="125" y="260" text-anchor="middle" class="small">spec L:</text>
    <text x="125" y="278" text-anchor="middle" class="small">0¹, 4⁴, 8⁹, 10⁸, 12²</text>

    <rect x="190" y="120" width="110" height="230" rx="8" class="c1" stroke="#1f2937" stroke-width="1.5"/>
    <text x="245" y="200" text-anchor="middle" font-weight="600">C₁</text>
    <text x="245" y="220" text-anchor="middle" class="small">σ-mobile orbit</text>
    <text x="245" y="240" text-anchor="middle" class="small">24 verts</text>

    <rect x="310" y="120" width="110" height="230" rx="8" class="c2" stroke="#1f2937" stroke-width="1.5"/>
    <text x="365" y="200" text-anchor="middle" font-weight="600">C₂</text>
    <text x="365" y="220" text-anchor="middle" class="small">σ-mobile orbit</text>
    <text x="365" y="240" text-anchor="middle" class="small">24 verts</text>

    <rect x="430" y="120" width="110" height="230" rx="8" class="c3" stroke="#1f2937" stroke-width="1.5"/>
    <text x="485" y="200" text-anchor="middle" font-weight="600">C₃</text>
    <text x="485" y="220" text-anchor="middle" class="small">σ-mobile orbit</text>
    <text x="485" y="240" text-anchor="middle" class="small">24 verts</text>

    <rect x="550" y="120" width="110" height="230" rx="8" class="c4" stroke="#1f2937" stroke-width="1.5"/>
    <text x="605" y="200" text-anchor="middle" font-weight="600">C₄</text>
    <text x="605" y="220" text-anchor="middle" class="small">σ-mobile orbit</text>
    <text x="605" y="240" text-anchor="middle" class="small">24 verts</text>
  </g>

  <text x="350" y="406" text-anchor="middle" class="small">disjoint union: |C₀| + |C₁| + |C₂| + |C₃| + |C₄| = 5 × 24 = 120</text>
  <text x="350" y="430" text-anchor="middle" class="accent">A₅ = 2I / {±1} permutes the five cosets (faithful, transitive)</text>
</svg>
