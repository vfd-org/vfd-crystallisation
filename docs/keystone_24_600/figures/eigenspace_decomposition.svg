<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14">
  <style>
    .frame { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
    .lifted { fill: #bfdbfe; stroke: #1d4ed8; stroke-width: 2; }
    .residual { fill: #fde68a; stroke: #b45309; stroke-width: 2; }
    .small { fill: #4b5563; font-size: 12px; }
    .accent { fill: #dc2626; font-weight: 600; }
  </style>

  <text x="360" y="32" text-anchor="middle" font-size="20" font-weight="600">E₆₀₀(12) = E_lifted ⊕ E_residual</text>

  <!-- Outer 25-dim frame -->
  <rect class="frame" x="60" y="60" width="600" height="220" rx="8"/>
  <text x="360" y="84" text-anchor="middle" font-weight="600">E₆₀₀(12)  —  dim 25  ≅  5·Y₅</text>

  <!-- Inner 10-dim lifted block -->
  <rect class="lifted" x="100" y="110" width="240" height="150" rx="6"/>
  <text x="220" y="170" text-anchor="middle" font-weight="600" fill="#1e3a8a">E_lifted</text>
  <text x="220" y="190" text-anchor="middle" fill="#1e3a8a">dim 10</text>
  <text x="220" y="212" text-anchor="middle" class="small">5 cosets × 2-dim local λ=12 modes</text>
  <text x="220" y="234" text-anchor="middle" font-weight="600" fill="#1e3a8a">≅ 2·Y₅</text>

  <!-- Inner 15-dim residual block -->
  <rect class="residual" x="380" y="110" width="240" height="150" rx="6"/>
  <text x="500" y="170" text-anchor="middle" font-weight="600" fill="#92400e">E_residual</text>
  <text x="500" y="190" text-anchor="middle" fill="#92400e">dim 15</text>
  <text x="500" y="212" text-anchor="middle" class="small">inter-coset operator sector</text>
  <text x="500" y="234" text-anchor="middle" font-weight="600" fill="#92400e">≅ 3·Y₅</text>

  <!-- Operator description -->
  <text x="360" y="312" text-anchor="middle">‖L₆₀₀ v − 12 v‖ ≤ 6.2 × 10⁻¹⁵ for every v ∈ E_lifted</text>
  <text x="360" y="334" text-anchor="middle" class="small">(local 24-cell λ=12 modes zero-extended to ℝ¹²⁰ remain exact 600-cell λ=12 eigenfunctions)</text>

  <text x="360" y="372" text-anchor="middle" class="accent">2 + 3 = 5  copies of Y₅ — the 5-dim irrep of A₅</text>
  <text x="360" y="394" text-anchor="middle" class="small">numerical character match against A₅ table: ≤ 5 × 10⁻¹⁵</text>
</svg>
