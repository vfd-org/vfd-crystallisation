<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 580" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14">
  <style>
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 1.5; }
    .boxAlt { fill: #f3f4f6; stroke: #1f2937; stroke-width: 1.5; }
    .label { fill: #111827; }
    .small { fill: #4b5563; font-size: 12px; }
    .accent { fill: #2563eb; }
    .arrow { stroke: #1f2937; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <text x="380" y="32" text-anchor="middle" font-size="20" font-weight="600">The 24–600 Spectral Bridge</text>

  <!-- Top: 600-cell -->
  <rect class="box" x="290" y="56" width="180" height="56" rx="6"/>
  <text x="380" y="78" text-anchor="middle" font-weight="600">600-cell</text>
  <text x="380" y="98" text-anchor="middle" class="small">120 vertices, 720 edges (d=1)</text>

  <!-- Arrow down -->
  <path class="arrow" d="M380 120 L380 158"/>
  <text x="395" y="143" class="small">five-coset decomposition (2T ≤ 2I)</text>

  <!-- 5 24-cell cosets -->
  <g>
    <rect class="boxAlt" x="40" y="160" width="120" height="60" rx="6"/>
    <text x="100" y="183" text-anchor="middle" font-weight="600">C₀ = V₂₄</text>
    <text x="100" y="202" text-anchor="middle" class="small">24-cell, 8-reg, 96 edges</text>

    <rect class="boxAlt" x="180" y="160" width="120" height="60" rx="6"/>
    <text x="240" y="183" text-anchor="middle" font-weight="600">C₁</text>
    <text x="240" y="202" text-anchor="middle" class="small">24-cell, 8-reg, 96 edges</text>

    <rect class="boxAlt" x="320" y="160" width="120" height="60" rx="6"/>
    <text x="380" y="183" text-anchor="middle" font-weight="600">C₂</text>
    <text x="380" y="202" text-anchor="middle" class="small">24-cell, 8-reg, 96 edges</text>

    <rect class="boxAlt" x="460" y="160" width="120" height="60" rx="6"/>
    <text x="520" y="183" text-anchor="middle" font-weight="600">C₃</text>
    <text x="520" y="202" text-anchor="middle" class="small">24-cell, 8-reg, 96 edges</text>

    <rect class="boxAlt" x="600" y="160" width="120" height="60" rx="6"/>
    <text x="660" y="183" text-anchor="middle" font-weight="600">C₄</text>
    <text x="660" y="202" text-anchor="middle" class="small">24-cell, 8-reg, 96 edges</text>
  </g>

  <!-- Arrows down to local λ=12 -->
  <path class="arrow" d="M100 224 L100 270"/>
  <path class="arrow" d="M240 224 L240 270"/>
  <path class="arrow" d="M380 224 L380 270"/>
  <path class="arrow" d="M520 224 L520 270"/>
  <path class="arrow" d="M660 224 L660 270"/>

  <text x="380" y="252" text-anchor="middle" class="small">local Laplacian λ = 12 (2-dim per coset)</text>

  <!-- 5 × 2-dim local λ=12 boxes -->
  <g>
    <rect class="box" x="40" y="272" width="120" height="42" rx="6"/>
    <text x="100" y="298" text-anchor="middle" class="accent">E_C₀(12) — 2D</text>

    <rect class="box" x="180" y="272" width="120" height="42" rx="6"/>
    <text x="240" y="298" text-anchor="middle" class="accent">E_C₁(12) — 2D</text>

    <rect class="box" x="320" y="272" width="120" height="42" rx="6"/>
    <text x="380" y="298" text-anchor="middle" class="accent">E_C₂(12) — 2D</text>

    <rect class="box" x="460" y="272" width="120" height="42" rx="6"/>
    <text x="520" y="298" text-anchor="middle" class="accent">E_C₃(12) — 2D</text>

    <rect class="box" x="600" y="272" width="120" height="42" rx="6"/>
    <text x="660" y="298" text-anchor="middle" class="accent">E_C₄(12) — 2D</text>
  </g>

  <!-- Funnel to E_lifted -->
  <path class="arrow" d="M100 314 L300 372"/>
  <path class="arrow" d="M240 314 L320 372"/>
  <path class="arrow" d="M380 314 L380 372"/>
  <path class="arrow" d="M520 314 L440 372"/>
  <path class="arrow" d="M660 314 L460 372"/>

  <!-- E_lifted box -->
  <rect class="box" x="260" y="372" width="240" height="48" rx="6"/>
  <text x="380" y="395" text-anchor="middle" font-weight="600">E_lifted = 10-dim</text>
  <text x="380" y="412" text-anchor="middle" class="small">zero-extension of 5 × E_C(12)</text>

  <!-- E_residual box (parallel) -->
  <rect class="box" x="540" y="372" width="180" height="48" rx="6"/>
  <text x="630" y="395" text-anchor="middle" font-weight="600">E_residual = 15-dim</text>
  <text x="630" y="412" text-anchor="middle" class="small">inter-coset sector</text>

  <!-- Direct sum -->
  <text x="510" y="402" text-anchor="middle" font-weight="600">⊕</text>

  <!-- Arrow down -->
  <path class="arrow" d="M450 420 L450 462"/>

  <!-- Global E600(12) -->
  <rect class="box" x="260" y="462" width="380" height="50" rx="6"/>
  <text x="450" y="486" text-anchor="middle" font-weight="600">E₆₀₀(12) = 25-dim, residual ≈ 6.2 × 10⁻¹⁵</text>
  <text x="450" y="503" text-anchor="middle" class="small">‖L₆₀₀ v − 12 v‖ &lt; 10⁻¹⁰ for every lifted v</text>

  <!-- Arrow down -->
  <path class="arrow" d="M450 512 L450 540"/>

  <!-- A_5 decomposition -->
  <text x="450" y="558" text-anchor="middle" font-weight="600" class="accent">
    E_lifted ≅ 2·Y₅,  E_residual ≅ 3·Y₅,  E₆₀₀(12) ≅ 5·Y₅
  </text>
</svg>
