<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 600" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14">
  <style>
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 1.5; }
    .stage1 { fill: #fde68a; }
    .stage2 { fill: #bfdbfe; }
    .stage3 { fill: #bbf7d0; }
    .stage4 { fill: #fbcfe8; }
    .stage5 { fill: #ddd6fe; }
    .lblg { font-weight: 600; fill: #111827; }
    .small { fill: #4b5563; font-size: 12px; }
    .arrow { stroke: #1f2937; stroke-width: 1.6; fill: none; marker-end: url(#arr); }
    .accent { fill: #dc2626; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <text x="240" y="30" text-anchor="middle" font-size="18" font-weight="600">The ladder: from finite geometry to global invariant sector</text>

  <rect class="box stage1" x="120" y="60" width="240" height="58" rx="8"/>
  <text x="240" y="83" text-anchor="middle" class="lblg">600-cell as 2I</text>
  <text x="240" y="103" text-anchor="middle" class="small">120 unit icosian quaternions, exact ℚ(√5)</text>

  <path class="arrow" d="M240 120 L240 158"/>
  <text x="246" y="142" class="small">Schläfli decomposition (Paper 1)</text>

  <rect class="box stage2" x="120" y="160" width="240" height="58" rx="8"/>
  <text x="240" y="183" text-anchor="middle" class="lblg">five 2T cosets in 2I</text>
  <text x="240" y="203" text-anchor="middle" class="small">C₀ ⊔ C₁ ⊔ C₂ ⊔ C₃ ⊔ C₄ = V₆₀₀, each = 24-cell</text>

  <path class="arrow" d="M240 220 L240 258"/>
  <text x="246" y="242" class="small">build local Laplacians at d²=1</text>

  <rect class="box stage3" x="120" y="260" width="240" height="58" rx="8"/>
  <text x="240" y="283" text-anchor="middle" class="lblg">local 24-cell shell Laplacians</text>
  <text x="240" y="303" text-anchor="middle" class="small">L_{Cᵢ}: 8-regular, spec includes λ=12 (mult 2 per coset)</text>

  <path class="arrow" d="M240 320 L240 358"/>
  <text x="246" y="342" class="small">λ=12 zero-extension lift (Paper 2)</text>

  <rect class="box stage4" x="120" y="360" width="240" height="58" rx="8"/>
  <text x="240" y="383" text-anchor="middle" class="lblg">selective λ=12 lift</text>
  <text x="240" y="403" text-anchor="middle" class="small">‖L₆₀₀ v − 12v‖ = 0 exactly over ℚ for every lifted v</text>

  <path class="arrow" d="M240 420 L240 458"/>
  <text x="246" y="442" class="small">A₅-stable inclusion</text>

  <rect class="box stage5" x="120" y="460" width="240" height="58" rx="8"/>
  <text x="240" y="483" text-anchor="middle" class="lblg">global 600-cell λ=12 sector</text>
  <text x="240" y="503" text-anchor="middle" class="small">E₆₀₀(12) = E_lifted ⊕ E_residual = 2·Y₅ ⊕ 3·Y₅</text>

  <text x="240" y="556" text-anchor="middle" class="accent" font-weight="600">A first concrete local-to-global closure-projection channel</text>
  <text x="240" y="578" text-anchor="middle" class="small">(in the sense of Definition 1 — interpretive, not a new theorem)</text>
</svg>
