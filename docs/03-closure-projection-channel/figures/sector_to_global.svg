<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14">
  <style>
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 1.4; }
    .c0 { fill: #fde68a; }
    .c1 { fill: #bfdbfe; }
    .c2 { fill: #bbf7d0; }
    .c3 { fill: #fbcfe8; }
    .c4 { fill: #ddd6fe; }
    .global { fill: #fef3c7; stroke: #92400e; stroke-width: 2; }
    .arrow { stroke: #1f2937; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .small { fill: #4b5563; font-size: 12px; }
    .lblg { font-weight: 600; }
    .accent { fill: #dc2626; font-weight: 600; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <text x="360" y="30" text-anchor="middle" font-size="18" font-weight="600">Five local λ=12 eigenspaces lift into one global λ=12 sector</text>

  <!-- 5 local sector boxes across the top -->
  <g>
    <rect class="box c0" x="40" y="76" width="116" height="68" rx="8"/>
    <text x="98" y="100" text-anchor="middle" class="lblg">C₀ = V₂₄</text>
    <text x="98" y="120" text-anchor="middle" class="small">E_{C₀}(12)</text>
    <text x="98" y="136" text-anchor="middle" class="small">2-dim</text>

    <rect class="box c1" x="170" y="76" width="116" height="68" rx="8"/>
    <text x="228" y="100" text-anchor="middle" class="lblg">C₁</text>
    <text x="228" y="120" text-anchor="middle" class="small">E_{C₁}(12)</text>
    <text x="228" y="136" text-anchor="middle" class="small">2-dim</text>

    <rect class="box c2" x="300" y="76" width="116" height="68" rx="8"/>
    <text x="358" y="100" text-anchor="middle" class="lblg">C₂</text>
    <text x="358" y="120" text-anchor="middle" class="small">E_{C₂}(12)</text>
    <text x="358" y="136" text-anchor="middle" class="small">2-dim</text>

    <rect class="box c3" x="430" y="76" width="116" height="68" rx="8"/>
    <text x="488" y="100" text-anchor="middle" class="lblg">C₃</text>
    <text x="488" y="120" text-anchor="middle" class="small">E_{C₃}(12)</text>
    <text x="488" y="136" text-anchor="middle" class="small">2-dim</text>

    <rect class="box c4" x="560" y="76" width="116" height="68" rx="8"/>
    <text x="618" y="100" text-anchor="middle" class="lblg">C₄</text>
    <text x="618" y="120" text-anchor="middle" class="small">E_{C₄}(12)</text>
    <text x="618" y="136" text-anchor="middle" class="small">2-dim</text>
  </g>

  <!-- 5 arrows merging into one box -->
  <path class="arrow" d="M98 148 Q260 240 360 268"/>
  <path class="arrow" d="M228 148 Q295 220 360 268"/>
  <path class="arrow" d="M358 148 L360 268"/>
  <path class="arrow" d="M488 148 Q425 220 360 268"/>
  <path class="arrow" d="M618 148 Q460 240 360 268"/>

  <text x="360" y="180" text-anchor="middle" class="small">lift₀, lift₁, lift₂, lift₃, lift₄ — zero-extension into ℝ¹²⁰</text>
  <text x="360" y="200" text-anchor="middle" class="accent">‖L₆₀₀ v − 12v‖ = 0 (exact, over ℚ)</text>

  <!-- E_lifted box -->
  <rect class="box" x="230" y="270" width="260" height="56" rx="8" fill="#bfdbfe"/>
  <text x="360" y="294" text-anchor="middle" class="lblg">E_lifted ⊂ E₆₀₀(12)</text>
  <text x="360" y="312" text-anchor="middle" class="small">dim 10 = 5 × 2,  A₅-stable ≅ 2·Y₅</text>

  <!-- E_residual box (parallel) -->
  <rect class="box" x="510" y="270" width="170" height="56" rx="8" fill="#fde68a"/>
  <text x="595" y="294" text-anchor="middle" class="lblg">E_residual</text>
  <text x="595" y="312" text-anchor="middle" class="small">dim 15, ≅ 3·Y₅</text>

  <text x="500" y="302" text-anchor="middle" class="lblg" font-size="18">⊕</text>

  <!-- Down to E_600(12) -->
  <path class="arrow" d="M360 326 L360 360"/>

  <!-- E_600(12) -->
  <rect class="global" x="200" y="362" width="320" height="44" rx="8"/>
  <text x="360" y="386" text-anchor="middle" class="lblg">global 600-cell λ=12 sector,  dim 25 ≅ 5·Y₅</text>
</svg>
