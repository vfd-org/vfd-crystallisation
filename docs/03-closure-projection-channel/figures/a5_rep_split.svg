<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14">
  <style>
    .frame { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
    .lifted { fill: #bfdbfe; stroke: #1d4ed8; stroke-width: 2; }
    .residual { fill: #fde68a; stroke: #b45309; stroke-width: 2; }
    .small { fill: #4b5563; font-size: 12px; }
    .lblg { font-weight: 600; fill: #111827; }
    .accent { fill: #dc2626; font-weight: 600; }
  </style>

  <text x="360" y="28" text-anchor="middle" font-size="18" font-weight="600">A₅ representation split of the global λ=12 sector</text>

  <!-- Outer frame: E_600(12) -->
  <rect class="frame" x="60" y="60" width="600" height="160" rx="8"/>
  <text x="360" y="82" text-anchor="middle" class="lblg">E₆₀₀(12) — dim 25 ≅ 5·Y₅</text>

  <!-- 5 unit boxes (each Y_5) -->
  <g>
    <rect class="lifted" x="100" y="110" width="80" height="80" rx="6"/>
    <text x="140" y="146" text-anchor="middle" class="lblg" fill="#1e3a8a">Y₅</text>
    <text x="140" y="166" text-anchor="middle" class="small">(lifted)</text>

    <rect class="lifted" x="200" y="110" width="80" height="80" rx="6"/>
    <text x="240" y="146" text-anchor="middle" class="lblg" fill="#1e3a8a">Y₅</text>
    <text x="240" y="166" text-anchor="middle" class="small">(lifted)</text>

    <rect class="residual" x="340" y="110" width="80" height="80" rx="6"/>
    <text x="380" y="146" text-anchor="middle" class="lblg" fill="#92400e">Y₅</text>
    <text x="380" y="166" text-anchor="middle" class="small">(residual)</text>

    <rect class="residual" x="440" y="110" width="80" height="80" rx="6"/>
    <text x="480" y="146" text-anchor="middle" class="lblg" fill="#92400e">Y₅</text>
    <text x="480" y="166" text-anchor="middle" class="small">(residual)</text>

    <rect class="residual" x="540" y="110" width="80" height="80" rx="6"/>
    <text x="580" y="146" text-anchor="middle" class="lblg" fill="#92400e">Y₅</text>
    <text x="580" y="166" text-anchor="middle" class="small">(residual)</text>
  </g>

  <text x="240" y="216" text-anchor="middle" class="lblg" fill="#1e3a8a">E_lifted ≅ 2·Y₅</text>
  <text x="480" y="216" text-anchor="middle" class="lblg" fill="#92400e">E_residual ≅ 3·Y₅</text>

  <!-- Equation -->
  <text x="360" y="266" text-anchor="middle" font-size="18" class="accent">5·Y₅  =  2·Y₅  ⊕  3·Y₅</text>
  <text x="360" y="292" text-anchor="middle" class="small">exact integer A₅ characters; classes 1A, 2A, 3A, 5A, 5B: (10, 2, −2, 0, 0) and (15, 3, −3, 0, 0)</text>
</svg>
