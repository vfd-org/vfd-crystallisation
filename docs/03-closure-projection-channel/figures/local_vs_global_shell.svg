<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14">
  <style>
    .axis { stroke: #1f2937; stroke-width: 1.4; }
    .v600 { stroke: #2563eb; stroke-width: 2; fill: none; }
    .v24 { stroke: #b45309; stroke-width: 2; fill: none; }
    .accent { fill: #dc2626; font-weight: 600; }
    .lblg { fill: #1f2937; font-weight: 600; }
    .small { fill: #4b5563; font-size: 12px; }
    .tick { fill: #4b5563; font-size: 11px; }
  </style>

  <text x="360" y="30" text-anchor="middle" font-size="18" font-weight="600">Local vs global shell: different operators, exact λ=12 compatibility</text>

  <line class="axis" x1="60" y1="220" x2="660" y2="220"/>
  <line class="axis" x1="60" y1="216" x2="60" y2="224"/>
  <line class="axis" x1="660" y1="216" x2="660" y2="224"/>
  <text x="60" y="247" text-anchor="middle" class="tick">d² = 0</text>
  <text x="660" y="247" text-anchor="middle" class="tick">d² = 4</text>
  <text x="360" y="263" text-anchor="middle" class="small">squared distance on V₆₀₀</text>

  <!-- V_600 shell-1: d² = (3-√5)/2 ≈ 0.382 -->
  <circle cx="117" cy="220" r="9" fill="#2563eb"/>
  <line class="v600" x1="117" y1="220" x2="117" y2="135" stroke-dasharray="4 3"/>
  <text x="117" y="120" text-anchor="middle" class="lblg" fill="#2563eb">global L₆₀₀ edges</text>
  <text x="117" y="100" text-anchor="middle" class="small" fill="#2563eb">d²₆₀₀ = (3 − √5)/2 ≈ 0.382</text>
  <text x="117" y="82" text-anchor="middle" class="small" fill="#2563eb">12-regular, 720 edges</text>

  <!-- V_24 (intra-coset): d² = 1 -->
  <circle cx="210" cy="220" r="9" fill="#b45309"/>
  <line class="v24" x1="210" y1="220" x2="210" y2="290" stroke-dasharray="4 3"/>
  <text x="210" y="308" text-anchor="middle" class="lblg" fill="#b45309">local L_{Cᵢ} edges</text>
  <text x="210" y="324" text-anchor="middle" class="small" fill="#b45309">d²₂₄ = 1</text>
  <text x="210" y="340" text-anchor="middle" class="small" fill="#b45309">8-regular per coset, 96 edges each</text>

  <!-- Additional V_600 shells as small marks -->
  <g fill="#94a3b8">
    <circle cx="267" cy="220" r="3"/>
    <circle cx="360" cy="220" r="3"/>
    <circle cx="453" cy="220" r="3"/>
    <circle cx="510" cy="220" r="3"/>
    <circle cx="603" cy="220" r="3"/>
    <circle cx="660" cy="220" r="3"/>
  </g>

  <text x="360" y="370" text-anchor="middle" class="accent">The two operators are built from different shells — yet at λ=12 they agree exactly.</text>
</svg>
