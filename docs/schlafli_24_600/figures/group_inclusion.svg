<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14">
  <style>
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 1.6; }
    .accent { fill: #2563eb; }
    .small { fill: #4b5563; font-size: 12px; }
    .arrow { stroke: #1f2937; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .lblg { font-weight: 600; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <text x="300" y="30" text-anchor="middle" font-size="20" font-weight="600">Group inclusions: 2T ⊂ 2I, index 5, quotient A₅</text>

  <!-- 2I -->
  <rect class="box" x="200" y="68" width="200" height="60" rx="8"/>
  <text x="300" y="92" text-anchor="middle" class="lblg">2I — binary icosahedral</text>
  <text x="300" y="112" text-anchor="middle" class="small">order 120 = |V₆₀₀|</text>

  <!-- 2T -->
  <rect class="box" x="100" y="180" width="200" height="60" rx="8"/>
  <text x="200" y="204" text-anchor="middle" class="lblg">2T — binary tetrahedral</text>
  <text x="200" y="224" text-anchor="middle" class="small">order 24 = |V₂₄|</text>

  <!-- {±1} -->
  <rect class="box" x="400" y="180" width="160" height="60" rx="8"/>
  <text x="480" y="204" text-anchor="middle" class="lblg">{±1} = Z(2I)</text>
  <text x="480" y="224" text-anchor="middle" class="small">order 2 (centre)</text>

  <!-- A_5 -->
  <rect class="box" x="200" y="280" width="200" height="60" rx="8"/>
  <text x="300" y="304" text-anchor="middle" class="lblg accent">A₅ = 2I / {±1}</text>
  <text x="300" y="324" text-anchor="middle" class="small">order 60 = 120 / 2</text>

  <!-- arrows -->
  <path class="arrow" d="M260 128 L200 180"/>
  <text x="210" y="160" class="small">subgroup, index 5</text>

  <path class="arrow" d="M340 128 L480 180"/>
  <text x="430" y="160" class="small">normal subgroup</text>

  <path class="arrow" d="M480 240 L300 280"/>
  <text x="412" y="266" class="small">quotient surjection</text>

  <text x="300" y="370" text-anchor="middle" class="small">2T is NOT normal in 2I → left and right cosets give different partitions of 2I</text>
</svg>
