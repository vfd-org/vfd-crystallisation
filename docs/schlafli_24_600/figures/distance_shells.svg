<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14">
  <style>
    .axis { stroke: #1f2937; stroke-width: 1.4; }
    .v600 { stroke: #2563eb; stroke-width: 2; fill: none; }
    .v24 { stroke: #b45309; stroke-width: 2; fill: none; }
    .accent { fill: #dc2626; }
    .lblg { fill: #1f2937; font-weight: 600; }
    .small { fill: #4b5563; font-size: 12px; }
    .tickV600 { fill: #2563eb; }
    .tickV24 { fill: #b45309; }
  </style>

  <text x="360" y="30" text-anchor="middle" font-size="20" font-weight="600">The two d² shells</text>

  <!-- baseline: a horizontal squared-distance axis -->
  <line class="axis" x1="60" y1="220" x2="660" y2="220"/>
  <line class="axis" x1="60" y1="216" x2="60" y2="224"/>
  <line class="axis" x1="660" y1="216" x2="660" y2="224"/>
  <text x="60" y="248" text-anchor="middle" class="small">d² = 0</text>
  <text x="660" y="248" text-anchor="middle" class="small">d² = 4</text>
  <text x="360" y="248" text-anchor="middle" class="small">squared distance on V₆₀₀</text>

  <!-- V_600 shortest shell: d² = (3-√5)/2 ≈ 0.382 → x ≈ 60 + (0.382/4)*600 ≈ 60 + 57.3 ≈ 117 -->
  <circle cx="117" cy="220" r="9" fill="#2563eb"/>
  <line class="v600" x1="117" y1="220" x2="117" y2="135" stroke-dasharray="4 3"/>
  <text x="117" y="120" text-anchor="middle" class="lblg" fill="#2563eb">d²(V₆₀₀) = (3 − √5)/2</text>
  <text x="117" y="100" text-anchor="middle" class="small" fill="#2563eb">≈ 0.382</text>
  <text x="117" y="84" text-anchor="middle" class="small" fill="#2563eb">12-regular, 720 edges</text>

  <!-- V_24 (intra-coset) shortest shell: d² = 1 → x = 60 + (1/4)*600 = 60 + 150 = 210 -->
  <circle cx="210" cy="220" r="9" fill="#b45309"/>
  <line class="v24" x1="210" y1="220" x2="210" y2="285" stroke-dasharray="4 3"/>
  <text x="210" y="306" text-anchor="middle" class="lblg" fill="#b45309">d²(C_i) = 1</text>
  <text x="210" y="324" text-anchor="middle" class="small" fill="#b45309">8-regular, 96 edges</text>
  <text x="210" y="342" text-anchor="middle" class="small" fill="#b45309">(intra-coset 24-cell)</text>

  <!-- Additional V_600 shells as small ticks (8 shells total) -->
  <!-- d²: 0.382, 1.000, 1.382, 2.000, 2.618, 3.000, 3.618, 4.000 → x positions -->
  <g class="tickV600">
    <circle cx="117" cy="220" r="6"/>
    <circle cx="210" cy="220" r="4"/>
    <circle cx="267" cy="220" r="4"/>
    <circle cx="360" cy="220" r="4"/>
    <circle cx="453" cy="220" r="4"/>
    <circle cx="510" cy="220" r="4"/>
    <circle cx="603" cy="220" r="4"/>
    <circle cx="660" cy="220" r="4"/>
  </g>

  <text x="360" y="360" text-anchor="middle" class="accent">No pair within a coset is joined by a V₆₀₀-edge: intra-coset 24-cell edges sit at d²=1, one shell up.</text>
</svg>
