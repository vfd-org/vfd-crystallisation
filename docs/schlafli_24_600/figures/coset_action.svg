<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14">
  <style>
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 1.6; }
    .accent { fill: #2563eb; }
    .arrow { stroke: #1f2937; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .small { fill: #4b5563; font-size: 12px; }
    .lblg { font-weight: 600; }
    .perm { fill: #ffffff; stroke: #1f2937; stroke-width: 1.4; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1f2937"/>
    </marker>
  </defs>

  <text x="360" y="30" text-anchor="middle" font-size="20" font-weight="600">Induced action: 2I → A₅ on five cosets</text>

  <!-- 2I -->
  <rect class="box" x="40" y="80" width="180" height="62" rx="8"/>
  <text x="130" y="106" text-anchor="middle" class="lblg">2I</text>
  <text x="130" y="126" text-anchor="middle" class="small">120 elements</text>

  <!-- A_5 -->
  <rect class="box" x="500" y="80" width="180" height="62" rx="8"/>
  <text x="590" y="106" text-anchor="middle" class="lblg accent">A₅ = 2I / {±1}</text>
  <text x="590" y="126" text-anchor="middle" class="small">60 elements, transitive on 5 points</text>

  <!-- arrow with kernel label -->
  <path class="arrow" d="M220 111 L500 111"/>
  <text x="360" y="100" text-anchor="middle" class="small">surjection, kernel = {±1}</text>
  <text x="360" y="128" text-anchor="middle" class="small">all images even (no odd permutations)</text>

  <!-- coset row C_0..C_4 -->
  <g>
    <circle class="perm" cx="120" cy="240" r="22"/>
    <text x="120" y="244" text-anchor="middle" font-weight="600">C₀</text>
    <circle class="perm" cx="240" cy="240" r="22"/>
    <text x="240" y="244" text-anchor="middle" font-weight="600">C₁</text>
    <circle class="perm" cx="360" cy="240" r="22"/>
    <text x="360" y="244" text-anchor="middle" font-weight="600">C₂</text>
    <circle class="perm" cx="480" cy="240" r="22"/>
    <text x="480" y="244" text-anchor="middle" font-weight="600">C₃</text>
    <circle class="perm" cx="600" cy="240" r="22"/>
    <text x="600" y="244" text-anchor="middle" font-weight="600">C₄</text>
  </g>

  <!-- example 5-cycle arrows -->
  <path class="arrow" d="M142 240 Q180 215 218 240"/>
  <path class="arrow" d="M262 240 Q300 215 338 240"/>
  <path class="arrow" d="M382 240 Q420 215 458 240"/>
  <path class="arrow" d="M502 240 Q540 215 578 240"/>
  <path class="arrow" d="M600 218 Q360 100 120 218"/>

  <text x="360" y="296" text-anchor="middle" class="small">action: (2T·v) · g = 2T · (vg);  one such 5-cycle shown</text>

  <!-- class-size box -->
  <rect class="box" x="180" y="316" width="360" height="48" rx="8"/>
  <text x="360" y="336" text-anchor="middle" class="lblg">Conjugacy-class sizes in A₅</text>
  <text x="360" y="356" text-anchor="middle" class="small">|1A| = 1, |2A| = 15, |3A| = 20, |5A| = 12, |5B| = 12</text>
</svg>
